<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notices</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="logo"><a href="#"> Logo </a></div>
        <ul class="links">
          <li>
            <a href="/frontend/dashboard.html" class="nav-link">Dashboard</a>
          </li>
          <li><a href="/frontend/tasks.html" class="nav-link">Tasks</a></li>
          <li><a href="/frontend/notices.html" class="nav-link">Notices</a></li>
        </ul>
        <a href="/frontend/login.html" class="action_btn">Log In</a>
        <div class="toggle_btn">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>

      <div class="dropdown_menu open">
        <li><a href="hero" class="nav-link">Dashboard</a></li>
        <li><a href="tasks" class="nav-link">Tasks</a></li>
        <li><a href="#" class="nav-link">Notices</a></li>
        <li><a href="" class="action_btn">Log In</a></li>
      </div>
    </header>

    <div class="controls">
      <div class="controls-container">
        <input
          type="text"
          id="searchInput"
          placeholder="Search notes..."
          class="search-input"
        />
        <div class="filter-group">
          <select id="filterSelect" class="filter-select">
            <option value="all">All Notices</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="reminders">Reminders</option>
          </select>
          <button id="addNoteBtn" class="add-btn">
            <i class="fas fa-plus"></i> Add Notice
          </button>
        </div>
      </div>
    </div>
    <div id="notesContainer" class="notes-grid">
      <!-- Notes will be dynamically added here -->
    </div>

    <div id="emptyState" class="empty-state">
      <i class="fas fa-notes-medical"></i>
      <h3>No notices yet</h3>
      <p>Add your first note by clicking the "Add Notice" button.</p>
    </div>

    <div id="addNoteModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">New Notice</h3>
          <button id="closeModalBtn" class="modal-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="noteForm" class="modal-body">
          <div class="formal-group">
            <label for="noteTitle" class="form-label">Title</label>
            <input type="text" id="noteTitle" class="form-input" required />
          </div>
          <div class="form-group">
            <label for="noteContent" class="form-label">Content</label>
            <textarea
              id="noteContent"
              class="form-input form-textarea"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Tags</label>
            <div class="tags-container">
              <label class="tag-option">
                <input
                  type="radio"
                  name="noteTag"
                  value="work"
                  class="tag-radio"
                />
                <span class="tad-label tag-work">
                  <i class="fas fa-briefcase"></i>
                  Work
                </span>
              </label>
              <label class="tag-option">
                <input
                  type="radio"
                  name="noteTag"
                  value="personal"
                  class="tag-radio"
                />
                <span class="tad-label tag-personal">
                  <i class="fas fa-user"></i>
                  Personal
                </span>
              </label>
              <label class="tag-option">
                <input
                  type="radio"
                  name="noteTag"
                  value="Ideas"
                  class="tag-radio"
                />
                <span class="tad-label tag-ideas">
                  <i class="fas fa-lightbulb"></i>
                  Ideas
                </span>
              </label>
              <label class="tag-option">
                <input
                  type="radio"
                  name="noteTag"
                  value="reminders"
                  class="tag-radio"
                />
                <span class="tad-label tag-reminders">
                  <i class="fas fa-bell"></i>
                  Reminders
                </span>
              </label>
            </div>
          </div>
          <button type="submit" class="submit-btn">Save Notice</button>
        </form>
      </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
      <div class="modal confirmation-modal">
        <div class="modal-body">
          <p class="confirmation-text">
            Are you sure you want to delete this notice?
          </p>
          <div class="confirmation-buttons">
            <button id="cancelDeleteBtn" class="confirmation-btn cancel-btn">
              Cancel
            </button>
            <button id="confirmDeleteBtn" class="confirmation-btn confirm-btn">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/Backend/noties.js"></script>
  </body>
</html>
