<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudTask - Tasks</title>
    <link rel="stylesheet" href="style2.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="logo"><a href="/frontend/index.html">Logo</a></div>
        <ul class="links">
          <li><a href="/frontend/dashboard.html">Dashboard</a></li>
          <li><a href="/frontend/tasks.html" style="color: coral">Tasks</a></li>
          <li><a href="/frontend/notices.html">Notices</a></li>
        </ul>
        <a href="#" class="action_btn">Log In</a>
      </div>
    </header>

    <main class="tasks-container">
      <div class="tasks-header">
        <h1>My Tasks</h1>
        <button id="openModalBtn" class="action_btn">Add Task</button>
      </div>

      <div id="taskList" class="task-grid">
        <!-- Картки додаються через JS -->
      </div>
    </main>

    <!-- Модальне вікно -->
    <div id="taskModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle">Add New Task</h2>
        <input type="hidden" id="editTaskId" />

        <input type="text" id="taskTitle" placeholder="Task Name..." />

        <label>Type:</label>
        <select id="taskType">
          <option value="Lecture">Lecture</option>
          <option value="Test">Test</option>
          <option value="Exam">Exam</option>
        </select>

        <label>Status:</label>
        <select id="taskStatus">
          <option value="todo">Not Done</option>
          <option value="process">In Progress</option>
          <option value="done">Done</option>
        </select>

        <div class="modal-buttons">
          <button id="saveBtn" class="action_btn" onclick="saveTask()">
            Save
          </button>
          <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- ПІДКЛЮЧАЄМО ТВІЙ JS -->
    <script src="/Backend/task.js"></script>
  </body>
</html>
